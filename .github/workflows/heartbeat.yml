name: Keep bot host awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Ping bot health endpoint
        run: npm run heartbeat
        env:
          HEARTBEAT_URL: ${{ vars.HEARTBEAT_URL }}
