name: Refill image cache
# (registered)

# Keeps ~1 year of calendar images buffered in images/ so the daily poster never
# depends on the site updating at midnight. Runs weekly, downloads any newly
# published days, and commits them. Re-run manually anytime from the Actions tab.

on:
  schedule:
    - cron: "0 7 * * 0" # Sundays 07:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: "How many days ahead to fetch"
        default: "365"

permissions:
  contents: write # allow committing new images back to the repo

concurrency:
  group: refill-cache
  cancel-in-progress: false

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download upcoming calendar images
        run: python3 fetch_year.py --days "${{ github.event.inputs.days || '365' }}" --delay 0.2

      - name: Commit new images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          if git diff --cached --quiet; then
            echo "No new images to commit."
          else
            git commit -m "chore: refill calendar image cache"
            git push
          fi
