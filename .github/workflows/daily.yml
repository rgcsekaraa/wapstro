name: Daily Tamil Calendar to WhatsApp

on:
  schedule:
    # 18:31 UTC = 00:01 IST (UTC+5:30), every day.
    # GitHub's scheduler is best-effort and can run a few minutes late; that is
    # harmless here (a slightly late run still posts the correct new-day image).
    - cron: "31 18 * * *"
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: write # commit the refreshed session + heartbeat back to the repo

# Prevent overlapping runs from racing on the session commit.
concurrency:
  group: whatsapp-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Download and post calendar image
        run: npm run send
        env:
          WA_CREDS: ${{ secrets.WA_CREDS }}
          WA_ENC_KEY: ${{ secrets.WA_ENC_KEY }}
          GROUP_JID: ${{ secrets.GROUP_JID }}
          GH_PAT: ${{ secrets.GH_PAT }} # optional; session persists without it
          IMAGE_CAPTION: ${{ vars.IMAGE_CAPTION }}

      # Always commit a heartbeat (and the refreshed session if it changed) so the
      # repo has daily activity -> scheduled workflows are never auto-disabled,
      # and the WhatsApp session is persisted without needing a PAT.
      - name: Persist session + heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          date -u +"%Y-%m-%dT%H:%M:%SZ heartbeat" > state/heartbeat.txt
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: session refresh + heartbeat [skip ci]"
            git push
          fi
