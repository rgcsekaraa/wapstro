name: Daily Tamil Calendar to WhatsApp

on:
  schedule:
    # Start early, then wait in-run until 18:31 UTC = 00:01 IST. This avoids most
    # GitHub schedule dispatch jitter, but GitHub can still start the runner late.
    - cron: "31 15 * * *"
  workflow_dispatch:
    inputs:
      target_group:
        description: "Where to send the images"
        type: choice
        default: "test"
        options:
          - test
          - production
      wait_for_send_time:
        description: "Wait until 18:31 UTC before sending"
        type: boolean
        default: false

permissions:
  contents: write # commit the refreshed session + heartbeat back to the repo

concurrency:
  group: whatsapp-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Wait until exact send time
        if: ${{ github.event_name == 'schedule' || inputs.wait_for_send_time }}
        run: node src/waitForSendTime.js
        env:
          STRICT_SEND_UTC: "18:31"
          STRICT_SEND_MAX_WAIT_MS: "14400000"

      - name: Download and post calendar image
        run: npm run send
        env:
          WA_CREDS: ${{ secrets.WA_CREDS }}
          WA_ENC_KEY: ${{ secrets.WA_ENC_KEY }}
          GROUP_JID: ${{ secrets.GROUP_JID }}
          TEST_GROUP_JID: ${{ secrets.TEST_GROUP_JID }}
          SEND_TARGET_GROUP: ${{ github.event_name == 'workflow_dispatch' && inputs.target_group || 'production' }}
          GH_PAT: ${{ secrets.GH_PAT }} # optional; session persists without it
          IMAGE_CAPTION: ${{ vars.IMAGE_CAPTION }}
          SRIRANGAM_IMAGE_CAPTION: ${{ vars.SRIRANGAM_IMAGE_CAPTION }}

      # Always commit a heartbeat (and refreshed session if changed) so the repo
      # has daily activity -> scheduled cron is never auto-disabled, and the
      # WhatsApp session is persisted without needing a PAT.
      - name: Persist session + heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          date -u +"%Y-%m-%dT%H:%M:%SZ heartbeat" > state/heartbeat.txt
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: session refresh + heartbeat [skip ci]"
            git pull --rebase --autostash origin master || true
            git push || (git pull --rebase --autostash origin master && git push)
          fi
